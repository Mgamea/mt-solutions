const PRODUCTS = [{"id": 1, "emoji": "\ud83d\udcbb", "brand": "Lenovo", "name": "ThinkPad X1 Carbon Gen 11", "price": 2349, "old": 2699, "badge": "new", "rating": 5, "reviews": 124, "cat": "computers"}, {"id": 2, "emoji": "\ud83d\udda5\ufe0f", "brand": "Dell", "name": "PowerEdge R750 \u2014 Rack Server", "price": 5899, "old": 6799, "badge": "promo", "rating": 4, "reviews": 87, "cat": "servers"}, {"id": 3, "emoji": "\ud83c\udf10", "brand": "Cisco", "name": "Catalyst 9200L \u2014 24-Port PoE+", "price": 1249, "old": null, "badge": "hot", "rating": 5, "reviews": 203, "cat": "network"}, {"id": 4, "emoji": "\ud83d\udd12", "brand": "Fortinet", "name": "FortiGate 60F \u2014 NGFW Firewall", "price": 789, "old": 949, "badge": null, "rating": 4, "reviews": 156, "cat": "security"}, {"id": 5, "emoji": "\ud83d\udda8\ufe0f", "brand": "HP", "name": "LaserJet Enterprise M507dn", "price": 649, "old": 799, "badge": "promo", "rating": 4, "reviews": 92, "cat": "computers"}, {"id": 6, "emoji": "\ud83d\udcf1", "brand": "Apple", "name": "MacBook Pro 14\" M3 Pro", "price": 2199, "old": 2499, "badge": "new", "rating": 5, "reviews": 341, "cat": "computers"}, {"id": 7, "emoji": "\ud83d\udcbe", "brand": "Samsung", "name": "970 EVO Plus 2TB NVMe SSD", "price": 189, "old": 229, "badge": "hot", "rating": 5, "reviews": 512, "cat": "servers"}, {"id": 8, "emoji": "\u2601\ufe0f", "brand": "Microsoft", "name": "Azure AD Premium P2", "price": 99, "old": null, "badge": null, "rating": 4, "reviews": 78, "cat": "software"}, {"id": 9, "emoji": "\ud83d\udda5\ufe0f", "brand": "HP", "name": "EliteDesk 800 G9 \u2014 i7 Desktop", "price": 1299, "old": 1549, "badge": "promo", "rating": 4, "reviews": 64, "cat": "computers"}, {"id": 10, "emoji": "\ud83d\udd0c", "brand": "APC", "name": "Smart-UPS 1500VA Rack 2U", "price": 879, "old": 999, "badge": null, "rating": 5, "reviews": 112, "cat": "servers"}, {"id": 11, "emoji": "\ud83d\udce1", "brand": "Cisco", "name": "Meraki MX68 \u2014 SD-WAN Security", "price": 2199, "old": 2499, "badge": "new", "rating": 5, "reviews": 44, "cat": "network"}, {"id": 12, "emoji": "\ud83d\uddb1\ufe0f", "brand": "Logitech", "name": "MX Keys S Combo \u2014 Wireless", "price": 249, "old": 299, "badge": "hot", "rating": 5, "reviews": 387, "cat": "computers"}];
let lang = localStorage.getItem('mt-lang') || 'en';
let cart = JSON.parse(localStorage.getItem('mt-cart') || '[]');

// Lang
function setLang(l) {
  lang = l; localStorage.setItem('mt-lang', l);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
  applyT();
  if (typeof onLangChange === 'function') onLangChange();
}
function t(k) { return T[lang][k] || T['en'][k] || k; }
function applyT() {
  document.querySelectorAll('[data-t]').forEach(el => el.textContent = t(el.dataset.t));
  document.querySelectorAll('[data-t-html]').forEach(el => el.innerHTML = t(el.dataset['t-html'] || el.dataset.tHtml));
  document.querySelectorAll('[data-t-ph]').forEach(el => el.placeholder = t(el.dataset.tPh));
  document.documentElement.lang = lang;
}

// Cart
function saveCart() { localStorage.setItem('mt-cart', JSON.stringify(cart)); }
function cartTotal() { return cart.reduce((s,i) => s + i.qty, 0); }
function updateCartDot() { document.querySelector('.cart-dot')?.classList.toggle('visible', cartTotal() > 0); }

function addToCart(id) {
  const p = PRODUCTS.find(x => x.id === id); if (!p) return;
  const ex = cart.find(x => x.id === id);
  if (ex) ex.qty++; else cart.push({...p, qty:1});
  saveCart(); updateCartDot();
  showToast('✓ ' + (lang === 'fr' ? p.emoji + ' Ajouté' : p.emoji + ' Added to cart'));
}
function changeQty(id, d) {
  const i = cart.find(x => x.id === id); if (!i) return;
  i.qty += d;
  if (i.qty <= 0) cart = cart.filter(x => x.id !== id);
  saveCart(); updateCartDot(); renderCart();
}

function openCart() {
  renderCart();
  document.getElementById('cartDrawer').classList.add('open');
  document.getElementById('cartOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeCart() {
  document.getElementById('cartDrawer').classList.remove('open');
  document.getElementById('cartOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function renderCart() {
  const body = document.getElementById('cartBody');
  const foot = document.getElementById('cartFoot');
  document.getElementById('cartTitle').textContent = t('cart.title');
  if (!cart.length) {
    body.innerHTML = `<div class="cart-empty-state"><div class="cart-empty-icon">🛒</div><p>${t('cart.empty')}</p></div>`;
    foot.innerHTML = `<button class="btn-keep" onclick="closeCart()">${t('cart.keep')}</button>`;
    return;
  }
  body.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="cart-item-thumb">${item.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-brand">${item.brand}</div>
        <div class="cart-item-name">${item.name}</div>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
          <button class="cart-item-del" onclick="changeQty(${item.id},-99)" title="Remove">✕</button>
        </div>
      </div>
      <div class="cart-item-price">$${(item.price * item.qty).toLocaleString()}</div>
    </div>`).join('');
  const sub = cart.reduce((s,i) => s + i.price * i.qty, 0);
  const ship = sub >= 500 ? 0 : 49;
  foot.innerHTML = `
    <div class="cart-row"><span>${t('cart.subtotal')}</span><span>$${sub.toLocaleString()}</span></div>
    <div class="cart-row"><span>${t('cart.shipping')}</span><span>${ship === 0 ? t('cart.free') : '$' + ship}</span></div>
    <div class="cart-row total"><span>${t('cart.total')}</span><span>$${(sub+ship).toLocaleString()}</span></div>
    <button class="btn-checkout" onclick="window.location.href='contact.html'">${t('cart.checkout')} →</button>
    <button class="btn-keep" onclick="closeCart()">${t('cart.keep')}</button>`;
}

// Toast
let _tt;
function showToast(msg) {
  clearTimeout(_tt);
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  _tt = setTimeout(() => el.classList.remove('show'), 2600);
}

// Mobile menu
function openMenu() { document.getElementById('mobileMenu').classList.add('open'); document.body.style.overflow='hidden'; }
function closeMenu() { document.getElementById('mobileMenu').classList.remove('open'); document.body.style.overflow=''; }

// Scroll effects
window.addEventListener('scroll', () => {
  document.querySelector('.nav')?.classList.toggle('scrolled', window.scrollY > 10);
}, {passive:true});

const io = new IntersectionObserver(entries => entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }), {threshold:.08});

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  applyT(); updateCartDot();
  document.querySelectorAll('.fade-up').forEach(el => io.observe(el));
  if (typeof onLangChange === 'function') onLangChange();
  document.addEventListener('keydown', e => { if(e.key==='Escape'){ closeCart(); closeMenu(); } });
});



function updateAnnouncement(lang) {
    const title = document.getElementById('maint-title');
    const partner = document.getElementById('maint-partner');
    const desc = document.getElementById('maint-desc');
    const suffix = document.getElementById('maint-suffix');

    if (lang === 'fr') {
        title.textContent = "Site en cours de mise à jour";
        desc.textContent = "Amélioration de votre ";
        partner.textContent = "Partenaire TI entreprise — Manitoba";
        suffix.textContent = ". Merci de votre patience !";
    } else {
        title.textContent = "Site Under Maintenance";
        desc.textContent = "Improving your ";
        partner.textContent = "Enterprise IT Partner — Manitoba";
        suffix.textContent = ". Thank you for your patience!";
    }
}

// Détection automatique via vos boutons de langue existants
document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        // On vérifie si le bouton cliqué est FR ou EN
        const isFr = this.textContent.trim().toLowerCase().includes('fr');
        updateAnnouncement(isFr ? 'fr' : 'en');
    });
});
</script>
